[global]
   # Modern Samba defaults to SMB2_02 as the floor; NT1 re-enables SMB1,
   # which is the whole point of this test server.
   server min protocol = NT1
   security = user
   map to guest = never
   # Only serve the direct-TCP port; no NetBIOS (139) needed in the container.
   smb ports = 445
   # Standalone server: no domain, no printers.
   server role = standalone server
   load printers = no
   printing = bsd
   disable spoolss = yes

[testshare]
   path = /srv/testshare
   read only = no
   guest ok = no
   browseable = yes
