name: CI

on:
  push:
    # auto/go-floor is pushed by update-go-floor via a deploy key so the
    # required build-test checks fire for its PR — an event created with the
    # default GITHUB_TOKEN would trigger no workflows.
    branches: ["main", "auto/go-floor"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # The library supports Go's two-release window: the floor leg proves the
  # go.mod `go` directive is honest, the stable leg proves the latest release
  # works. Both are required checks.
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [floor, stable]
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          # setup-go prefers go-version over go-version-file, and treats an
          # empty string as unset — so exactly one of these applies per leg.
          go-version: ${{ matrix.go == 'stable' && 'stable' || '' }}
          go-version-file: ${{ matrix.go == 'floor' && 'go.mod' || '' }}

      # Run on the toolchain setup-go installed — never silently download a
      # newer one, or the floor leg would stop testing the floor.
      - name: Forbid toolchain switching
        run: echo "GOTOOLCHAIN=local" >> "$GITHUB_ENV"

      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needed on:"
            echo "$out"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./... && go vet -tags integration ./...

      - name: Test
        env:
          CGO_ENABLED: "1" # the race detector needs cgo
        run: go test -race -count=1 ./...

      - name: Cross-builds
        run: |
          GOOS=windows GOARCH=amd64 go build ./...
          GOOS=darwin GOARCH=arm64 go build ./...
          GOOS=linux GOARCH=arm64 go build ./...

  # Blackbox suite against the dockerized Samba SMB1 server. Post-merge only:
  # the unit matrix gates PRs, and a container bring-up per PR would waste far
  # more than it catches.
  integration:
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Start Samba SMB1 server
        run: ./integration/up.sh

      - name: Integration tests
        run: go test -tags integration -count=1 -v ./

      - name: Stop Samba SMB1 server
        if: always()
        run: ./integration/down.sh
