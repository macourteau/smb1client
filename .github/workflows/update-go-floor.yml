name: Update Go floor

# Maintains the go.mod `go` directive at the lowest value satisfying both
# lower bounds: Go's two-release support window (computed here weekly) and
# the dependencies' own floors (dispatched with an explicit `floor` input by
# dependabot-go-floor when a dep bump needs more). The directive is a viral
# consumer-facing minimum, so this only ever RAISES it — never to latest,
# never lowered. `go mod edit -go=` only; never `go mod tidy`.
#
# Pushes use a write deploy key (GO_FLOOR_DEPLOY_KEY): a GITHUB_TOKEN push
# would trigger no workflows, the required checks would never run, and
# auto-merge would deadlock. ci.yml triggers on push to auto/go-floor for the
# same reason.

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC, batches with the Dependabot wave
  workflow_dispatch:
    inputs:
      floor:
        description: "Target floor (e.g. 1.26.0); empty computes the window floor"
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-go-floor
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ssh-key: ${{ secrets.GO_FLOOR_DEPLOY_KEY }}

      - uses: actions/setup-go@v7
        with:
          go-version: stable

      - name: Compute window floor
        id: floor
        env:
          REQUESTED: ${{ inputs.floor }}
        run: |
          set -euo pipefail
          if [ -n "$REQUESTED" ]; then
            case "$REQUESTED" in 1.[0-9]*) ;; *) echo "bad floor input: $REQUESTED"; exit 1 ;; esac
            floor="$REQUESTED"
          else
            latest=$(curl -fsSL 'https://go.dev/dl/?mode=json' | jq -r '.[0].version')
            case "$latest" in go1.*) ;; *) echo "unexpected version: $latest"; exit 1 ;; esac
            minor=$(echo "$latest" | sed -E 's/^go1\.([0-9]+).*$/\1/')
            floor="1.$((minor - 1)).0"
          fi
          current=$(awk '/^go /{print $2}' go.mod)
          echo "target-floor=$floor current=$current"
          # Raise only: proceed when floor is strictly newer than current.
          if [ "$floor" = "$current" ] || \
             [ "$(printf '%s\n%s\n' "$current" "$floor" | sort -V | tail -1)" != "$floor" ]; then
            echo "floor is current -> nothing to do"
            echo "update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "update=true" >> "$GITHUB_OUTPUT"
          echo "floor=$floor" >> "$GITHUB_OUTPUT"
          echo "short=$(echo "$floor" | sed 's/\.0$//')" >> "$GITHUB_OUTPUT"

      - name: Open floor-raise PR
        if: steps.floor.outputs.update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLOOR: ${{ steps.floor.outputs.floor }}
          SHORT: ${{ steps.floor.outputs.short }}
        run: |
          set -euo pipefail
          go mod edit -go="$FLOOR"
          git diff -- go.mod
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b auto/go-floor
          git commit -am "feat: raise the Go version floor to ${SHORT}"
          git push --force-with-lease origin auto/go-floor
          gh pr create --fill --head auto/go-floor 2>/dev/null || true
          gh pr merge auto/go-floor --auto --squash
